<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Travelio - бронирования отелей</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

    <div class="header">
        <div class="logo"><i class="fas fa-hotel"></i> Travelio</div>
            <span><i class="fas fa-question-circle"></i> Помощь</span>
            <span><i class="fas fa-globe"></i> RU</span>
        </div>
    </div>

    <div class="auth-section" id="authBlock">
        <div class="auth-forms">
            <div class="form-card">
                <h3><i class="fas fa-sign-in-alt"></i> Вход</h3>
                <div class="input-group"><input type="email" placeholder="Email" id="loginEmail"></div>
                <div class="input-group"><input type="password" placeholder="Пароль" id="loginPass"></div>
                <button class="btn" id="loginBtn">Войти</button>
                <div class="social-login">
                    <button><i class="fab fa-google"></i> Google</button>
                    <button><i class="fab fa-vk"></i> VK</button>
                    <button><i class="fab fa-apple"></i> Apple</button>
                </div>
            </div>
            <div class="form-card">
                <h3><i class="fas fa-user-plus"></i> Регистрация</h3>
                <div class="input-group"><input type="text" placeholder="Имя" id="regName"></div>
                <div class="input-group"><input type="email" placeholder="Email" id="regEmail"></div>
                <div class="input-group"><input type="password" placeholder="Пароль" id="regPass"></div>
                <button class="btn btn-outline" id="registerBtn">Зарегистрироваться</button>
                <div style="font-size:0.7rem; margin-top:0.5rem;">* Нажимая, вы соглашаетесь с офертой</div>
            </div>
        </div>
        <div class="benefits">
            <h4><i class="fas fa-gem"></i> Преимущества</h4>
            <ul>
                <li><i class="fas fa-bolt"></i> Быстрое бронирование в 1 клик</li>
                <li><i class="fas fa-history"></i> История поездок</li>
                <li><i class="fas fa-percent"></i> Кешбэк 5% баллами</li>
                <li><i class="fas fa-phone-alt"></i> Приоритетная поддержка</li>
            </ul>
        </div>
    </div>
