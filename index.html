<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travelio — Вход и Регистрация</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>

<div class="app">
    <div class="header">
        <div class="logo">🏘 Travelio</div>
        <div class="nav">
            <a href="index.html" class="nav-link active">Вход и Регистрация</a>
            <a href="booking.html" class="nav-link">Бронирование</a>
            <a href="details.html" class="nav-link">Детали бронирования</a>
            <span class="nav-item">!? Помощь</span>
            <span class="nav-item">RU</span>
        </div>
    </div>

    <div class="two-forms">
  
        <div class="form-box">
            <h2>Вход</h2>
            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="your@email.com">
            </div>
            <div class="input-group">
                <label>Пароль</label>
                <input type="password" placeholder="••••••">
            </div>
            <button class="btn-submit">Войти</button>
            <div class="social">
                <span>Google</span>
                <span>VK</span>
                <span>Apple</span>
            </div>
        </div>

        <div class="form-box">
            <h2>Регистрация</h2>
            <div class="input-group">
                <label>Имя</label>
                <input type="text" placeholder="Иван">
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="ivan@mail.ru">
            </div>
            <div class="input-group">
                <label>Пароль</label>
                <input type="password" placeholder="минимум 6 символов">
            </div>
            <button class="btn-submit">Зарегистрироваться</button>
            <div class="offer">Нажимая, вы соглашаетесь с офертой</div>
        </div>
    </div>

    <div class="footer">
            <div class="podval"><span>🏘 Travelio</span></div>
            <br><br>
            <div class="pohy">
        <p>+7(904)242-42-52</p>
        <span>travelio777@gmail.com</span>
        </div>
        </div>
    </div>

</body>
</html>
